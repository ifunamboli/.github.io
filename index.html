function waLink(msg){return `https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;}
function openWA(msg){window.open(waLink(msg),"_blank");}
function fmtDate(d){if(!d)return"";try{return new Date(d).toLocaleDateString("it-IT",{day:"numeric",month:"long"});}catch{return d;}}
function imgSrc(f){if(!f)return null;if(f.startsWith("http")||f.startsWith("data:"))return f;return `./immagini/${f}`;}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function jsAttr(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/\n/g," "); }

async function fetchJson(url,fallback){
  try{ const r=await fetch(url); if(!r.ok)throw new Error(); return await r.json(); }catch{ return fallback; }
}
async function loadData(){
  state.eventi=await fetchJson(DATA_URLS.eventi,SAMPLE.eventi);
  state.gdl=await fetchJson(DATA_URLS.gdl,SAMPLE.gdl);
  state.libri=await fetchJson(DATA_URLS.libri,SAMPLE.libri);
  state.oggi=await fetchJson(DATA_URLS.oggi,SAMPLE.oggi);
  state.homepage=await fetchJson(DATA_URLS.homepage,SAMPLE.homepage);
  state.impostazioni=await fetchJson(DATA_URLS.impostazioni,SAMPLE.impostazioni);
  const imgOverride=await fetchJson(DATA_URLS.immagini,null);
  if(imgOverride) SITE_IMG=Object.assign({},SITE_IMG,imgOverride);
  const testiOverride=await fetchJson(DATA_URLS.testi,null);
  if(testiOverride) TESTI=Object.assign({},DEFAULT_TESTI,testiOverride);
  const terrOverride=await fetchJson(DATA_URLS.scaffali,null);
  if(Array.isArray(terrOverride)){
    TERRITORI=DEFAULT_TERRITORI.map(def=>{
      const o=terrOverride.find(x=>x.nome===def.nome);
      return o?Object.assign({},def,o):def;
    });
  }
  if(state.impostazioni){
    PHONE=state.impostazioni.telefono||PHONE; EMAIL=state.impostazioni.email||EMAIL;
    IG=state.impostazioni.instagram||IG; ADDR=state.impostazioni.indirizzo||ADDR;
    SITE_NAME=state.impostazioni.nomeAttivita||SITE_NAME; RAGIONE_SOCIALE=state.impostazioni.ragioneSociale||RAGIONE_SOCIALE; PIVA=state.impostazioni.piva||PIVA;
  }
  render();
}
function navigate(section, fromHistory){
  state.section=section; state.menuOpen=false; state.selTerr=null; state.selLibro=null; render();

  document.title=titles[section]||"I Funamboli";
  if(!fromHistory){ try{ history.pushState({section}, "", "#"+section); }catch{} }
}
window.addEventListener("popstate", function(){

function runFades(){
  document.querySelectorAll(".fade:not(.in)").forEach(el=>{
    const obs=new IntersectionObserver(([e])=>{ if(e.isIntersecting){ el.classList.add("in"); obs.disconnect(); } },{threshold:.1});
    obs.observe(el);
  });
}
function render(){
  renderShell();
  const c=document.getElementById("content");
  if(state.section==="home") c.innerHTML=renderHome();
  else if(state.section==="scaffali") c.innerHTML=renderScaffali();
  else if(state.section==="eventi") c.innerHTML=renderEventi();
  else if(state.section==="gdl") c.innerHTML=renderGdl();
  else if(state.section==="wishlist") c.innerHTML=renderWishlist();
  else if(state.section==="tavolo") c.innerHTML=renderTavolo();
  else if(state.section==="dove") c.innerHTML=renderDove();

  else if(state.section==="cookie") c.innerHTML=renderCookie();

}

function shareResult(territorio){
  const testo=`Il mio territorio emotivo ai Funamboli è "${territorio}". Scopri il tuo su ifunamboli.it`;

function quizStart(){ state.quizStep=0; state.quizAns=[]; state.quizRes=null; render(); }
function quizAnswer(i){
  state.quizAns.push(i);
  if(state.quizStep<QUIZ.length-1){ state.quizStep++; }
  else{ const counts={}; state.quizAns.forEach((r,qi)=>{ const t=QUIZ_MAP[qi][r]; counts[t]=(counts[t]||0)+1; }); state.quizRes=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]; }
  render();
}

    <p style="font-weight:500;margin-bottom:.5rem;">5. Destinatari dei dati e trattamenti affidati a terzi</p>

    <p style="font-weight:500;margin-bottom:.5rem;">6. Trasferimento dei dati extra-UE</p>

    <p style="font-weight:500;margin-bottom:.5rem;">7. Periodo di conservazione</p>

    <p style="font-weight:500;margin-bottom:.5rem;">Cookie utilizzati da questo sito</p>

    <p style="font-weight:500;margin-bottom:.5rem;">Connessioni a servizi terzi non basate su cookie</p>
    <p style="margin-bottom:1.5rem;">Per la visualizzazione dei caratteri tipografici, il sito richiama la libreria Google Fonts direttamente dai server di Google Ireland Ltd. Tale richiamo comporta la trasmissione dell'indirizzo IP del dispositivo dell'utente a Google, secondo la relativa informativa privacy, ma non comporta l'installazione di cookie sul dispositivo dell'utente.</p>

    <p style="font-weight:500;margin-bottom:.5rem;">Link a piattaforme esterne</p>
    <p style="margin-bottom:1.5rem;">Il sito contiene collegamenti ipertestuali a WhatsApp, Instagram e Google Maps. Qualora l'utente decida di seguire tali collegamenti, verrà indirizzato a siti o applicazioni di terze parti che possono installare propri cookie secondo le rispettive cookie policy, del tutto indipendenti da questo sito e non soggette al controllo del titolare.</p>
